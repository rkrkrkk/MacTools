name: MacTools
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.8.1
targets:
  MacTools:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    sources:
      - path: Sources
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: MacTools
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_IDENTIFIER_PREFIX).mactools
        CURRENT_PROJECT_VERSION: 3
        MARKETING_VERSION: 0.3.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Configs/MacTools-Info.plist
        SPARKLE_PUBLIC_ED_KEY: YS4ioWunyQC5rP/YQdDbG9panyqCKNyBd0iPTUqIFY0=

  MacToolsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: MacTools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_IDENTIFIER_PREFIX).mactoolsTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MacTools:
    build:
      targets:
        MacTools: all
        MacToolsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: MacToolsTests
          parallelizable: true
    profile:
      config: Release
    archive:
      config: Release
